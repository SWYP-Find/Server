name: Java CI/CD with Gradle (Dev Server)

on:
  push:
    branches: [ "dev" ] # 1. 데브 브랜치 전용
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test

      - name: Create .env file from Secret
        run: |
          cat <<'EOF' > .env
          ${{ secrets.ENV_VARIABLES }}
          EOF

      - name: Copy JAR and .env to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*-SNAPSHOT.jar, .env"
          target: "~/dev-server" # 2. 데브 전용 폴더
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 3. 8081 포트만 종료 (8080은 건드리지 않음)
            fuser -k 8081/tcp || true 
            
            cd ~/dev-server
            chmod +x *.jar
            # 4. 8081 포트로 실행
            export $(grep -v '^#' .env | xargs) && nohup java -jar -Dserver.port=8081 *-SNAPSHOT.jar > dev-app.log 2>&1 &