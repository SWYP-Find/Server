name: Java CI/CD with Gradle (Main Server)

on:
  push:
    branches: [ "main" ] # 1. 메인 브랜치 전용
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test

      - name: Create .env file from Secret
        run: |
          cat <<'EOF' > .env
          ${{ secrets.ENV_VARIABLES }}
          EOF

      # // 1. 전송용 폴더 준비
      - name: Prepare deployment files
        run: |
          mkdir -p deploy
          cp build/libs/*-SNAPSHOT.jar deploy/
          cp .env deploy/

      # // 2. 메인 서버 폴더로 전송
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/*"
          target: "~/main-server"
          strip_components: 1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 3. 8080 포트 종료
            fuser -k 8080/tcp || true 
            
            cd ~/main-server
            chmod +x *.jar
            
            # // 2. 환경변수 등록 후 8080 포트로 실행
            export $(grep -v '^#' .env | xargs) && nohup java -jar -Dserver.port=8080 *-SNAPSHOT.jar > main-app.log 2>&1 &