services:
  db:
    image: postgres:15
    container_name: pique-postgres-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT:-5433}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

networks:
  default:
    name: pique-network