version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pique-postgres-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5433"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - pique-network

networks:
  pique-network:
    driver: bridge