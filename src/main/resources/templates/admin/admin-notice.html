<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picke Admin - 공지사항</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-[#F9F8F6] text-gray-800 min-h-screen flex flex-col">
<div th:replace="~{admin/fragments/header :: header}"></div>

<main class="flex-1 w-full max-w-[1200px] mx-auto p-8 grid grid-cols-1 lg:grid-cols-[420px_1fr] gap-6">
    <section class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm h-fit">
        <h1 class="text-xl font-black text-gray-900 mb-1">공지사항 작성</h1>
        <p class="text-xs text-gray-500 mb-6">저장하면 사용자 알림으로 노출됩니다.</p>

        <form id="notice-form" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1.5">작성 카테고리</label>
                <div id="notice-create-category-group" class="grid grid-cols-3 gap-2">
                    <button type="button" data-create-category="CONTENT" class="create-category-btn px-3 py-2 rounded-lg border text-xs font-bold border-gray-200 bg-gray-50 text-gray-600 hover:bg-gray-100">콘텐츠</button>
                    <button type="button" data-create-category="NOTICE" class="create-category-btn px-3 py-2 rounded-lg border text-xs font-bold border-black bg-black text-white">공지사항</button>
                    <button type="button" data-create-category="EVENT" class="create-category-btn px-3 py-2 rounded-lg border text-xs font-bold border-gray-200 bg-gray-50 text-gray-600 hover:bg-gray-100">이벤트</button>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1.5">제목</label>
                <input id="notice-title" type="text" class="w-full border border-gray-200 rounded-lg bg-gray-50 p-3 text-sm outline-none focus:border-black" maxlength="150" />
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-600 mb-1.5">내용</label>
                <textarea id="notice-body" rows="8" class="w-full border border-gray-200 rounded-lg bg-gray-50 p-3 text-sm outline-none focus:border-black"></textarea>
            </div>

            <button type="submit" class="w-full py-3 bg-black text-white rounded-lg text-sm font-bold hover:bg-gray-800 transition">
                공지 등록
            </button>
        </form>
    </section>

    <section class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-black text-gray-900">최근 공지</h2>
            <button id="refresh-notice-list" class="px-3 py-1.5 border border-gray-200 rounded-lg text-xs font-bold text-gray-600 hover:bg-gray-50">새로고침</button>
        </div>

        <div class="mb-4">
            <div id="notice-filter-group" class="grid grid-cols-4 gap-2">
                <button type="button" data-filter-category="ALL" class="filter-category-btn px-3 py-2 rounded-lg border text-xs font-bold border-black bg-black text-white">전체</button>
                <button type="button" data-filter-category="CONTENT" class="filter-category-btn px-3 py-2 rounded-lg border text-xs font-bold border-gray-200 bg-gray-50 text-gray-600 hover:bg-gray-100">콘텐츠</button>
                <button type="button" data-filter-category="NOTICE" class="filter-category-btn px-3 py-2 rounded-lg border text-xs font-bold border-gray-200 bg-gray-50 text-gray-600 hover:bg-gray-100">공지사항</button>
                <button type="button" data-filter-category="EVENT" class="filter-category-btn px-3 py-2 rounded-lg border text-xs font-bold border-gray-200 bg-gray-50 text-gray-600 hover:bg-gray-100">이벤트</button>
            </div>
        </div>

        <div class="overflow-hidden border border-gray-100 rounded-xl">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 text-gray-500 border-b border-gray-100">
                <tr>
                    <th class="px-4 py-3 font-bold w-20">ID</th>
                    <th class="px-4 py-3 font-bold w-28">카테고리</th>
                    <th class="px-4 py-3 font-bold">제목</th>
                    <th class="px-4 py-3 font-bold w-36">작성일</th>
                </tr>
                </thead>
                <tbody id="notice-list-tbody" class="divide-y divide-gray-100">
                <tr><td colspan="4" class="px-4 py-10 text-center text-gray-400">불러오는 중...</td></tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<script th:src="@{/js/admin/notice/notice.js}"></script>
</body>
</html>
