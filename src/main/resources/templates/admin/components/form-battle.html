<div th:fragment="battleForm" id="form-battle" class="space-y-8" xmlns:th="http://www.thymeleaf.org">

    <section id="section-basic" class="bg-white rounded-2xl p-8 border border-gray-200 shadow-sm">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold flex items-center"><span class="bg-black text-white rounded-full w-6 h-6 flex items-center justify-center text-sm mr-2">1</span> 기본 정보</h2>
            <span class="text-xs text-gray-400 font-mono">BATTLE</span>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">제목 <span class="text-red-500">*</span></label>
                <textarea id="content-title" name="title" rows="2" placeholder="배틀 제목을 입력하세요" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm outline-none focus:border-black transition-all form-scrollbar"></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">카테고리 태그</label>
                <div class="flex flex-wrap gap-2 items-center min-h-[42px]" id="basic-tags-container">
                    <button type="button" onclick="window.openTagSelectModal('CATEGORY')" class="px-3 py-1.5 border border-dashed border-gray-300 text-gray-500 rounded-full text-xs font-bold hover:bg-gray-50 transition-all">+ 태그 추가</button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">요약</label>
                <textarea id="content-summary" name="summary" rows="3" placeholder="배틀 요약 내용을 입력하세요" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm outline-none focus:border-black transition-all form-scrollbar"></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">설명</label>
                <textarea id="content-desc" name="description" rows="2" placeholder="배틀 상세 설명을 입력하세요" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm outline-none focus:border-black transition-all form-scrollbar"></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">썸네일</label>
                <label for="thumbnail-upload" class="cursor-pointer flex flex-col items-center justify-center w-full h-64 border-2 border-dashed border-gray-300 rounded-lg bg-gray-50 hover:bg-gray-100 transition relative overflow-hidden group">
                    <div id="thumbnail-preview-bg" class="absolute inset-0 bg-cover bg-center transition-all duration-300 opacity-0 group-hover:opacity-100"></div>
                    <div id="thumbnail-placeholder" class="flex flex-col items-center justify-center z-10 bg-white/80 px-6 py-3 rounded-xl shadow-sm">
                        <span class="text-3xl mb-1">업로드</span>
                        <p class="text-xs text-gray-600 font-bold">이미지를 드래그하거나 클릭하여 업로드</p>
                    </div>
                    <input id="thumbnail-upload" type="file" class="hidden" accept="image/*" />
                </label>
            </div>
        </div>
    </section>

    <section id="section-chars" class="bg-white rounded-2xl p-8 border border-gray-200 shadow-sm">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold flex items-center"><span class="bg-black text-white rounded-full w-6 h-6 flex items-center justify-center text-sm mr-2">2</span> 배틀 선택지</h2>
            <span class="text-xs text-gray-400 font-mono">OPTIONS</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative">
            <div class="hidden md:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-[#F5F0EA] text-[#8B7355] font-black text-xs px-3 py-1.5 rounded-full z-10 border-2 border-white shadow-sm">VS</div>

            <div class="bg-[#F8F9FA] p-6 rounded-2xl border border-gray-100 space-y-4">
                <h3 class="text-blue-600 font-bold text-sm border-b border-blue-100 pb-2">선택지 A</h3>
                <input type="hidden" name="options[0].label" value="A" />
                <textarea id="char-a-title" name="options[0].title" rows="1" placeholder="A 주장" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm outline-none focus:border-blue-400 form-scrollbar"></textarea>
                <textarea id="char-a-rep" name="options[0].representative" rows="1" placeholder="A 철학자" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm outline-none focus:border-blue-400 form-scrollbar"></textarea>
                <textarea id="char-a-stance" name="options[0].stance" rows="2" placeholder="A 입장" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm outline-none focus:border-blue-400 form-scrollbar"></textarea>
                <label class="cursor-pointer flex items-center justify-center w-full h-48 border border-gray-200 rounded-lg bg-white relative overflow-hidden group">
                    <div id="char-a-img-bg" class="absolute inset-0 bg-cover bg-center transition-all opacity-0"></div>
                    <span id="char-a-img-placeholder" class="text-xs font-bold text-gray-400 z-10">A 철학자 이미지</span>
                    <input type="file" id="char-a-img-upload" class="hidden" accept="image/*" />
                </label>

                <label class="block text-[11px] font-bold text-gray-500">철학자 태그</label>
                <div class="flex flex-wrap gap-2 items-center bg-white p-2 border border-gray-100 rounded-lg min-h-[42px]" id="battle-a-philosopher-tags-container">
                    <button type="button" onclick="window.openTagSelectModal('BATTLE_A_PHILOSOPHER')" class="px-2 py-1 border border-dashed border-gray-300 text-gray-500 rounded text-[10px] font-bold">+ 철학자 태그</button>
                </div>
                <label class="block text-[11px] font-bold text-gray-500">가치관 태그</label>
                <div class="flex flex-wrap gap-2 items-center bg-white p-2 border border-gray-100 rounded-lg min-h-[42px]" id="battle-a-value-tags-container">
                    <button type="button" onclick="window.openTagSelectModal('BATTLE_A_VALUE')" class="px-2 py-1 border border-dashed border-gray-300 text-gray-500 rounded text-[10px] font-bold">+ 가치관 태그</button>
                </div>
            </div>

            <div class="bg-[#FFF8F8] p-6 rounded-2xl border border-gray-100 space-y-4">
                <h3 class="text-red-600 font-bold text-sm border-b border-red-100 pb-2">선택지 B</h3>
                <input type="hidden" name="options[1].label" value="B" />
                <textarea id="char-b-title" name="options[1].title" rows="1" placeholder="B 주장" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm outline-none focus:border-red-400 form-scrollbar"></textarea>
                <textarea id="char-b-rep" name="options[1].representative" rows="1" placeholder="B 철학자" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm outline-none focus:border-red-400 form-scrollbar"></textarea>
                <textarea id="char-b-stance" name="options[1].stance" rows="2" placeholder="B 입장" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm outline-none focus:border-red-400 form-scrollbar"></textarea>

                <label class="cursor-pointer flex items-center justify-center w-full h-48 border border-gray-200 rounded-lg bg-white relative overflow-hidden group">
                    <div id="char-b-img-bg" class="absolute inset-0 bg-cover bg-center transition-all opacity-0"></div>
                    <span id="char-b-img-placeholder" class="text-xs font-bold text-gray-400 z-10">B 철학자 이미지</span>
                    <input type="file" id="char-b-img-upload" class="hidden" accept="image/*" />
                </label>

                <label class="block text-[11px] font-bold text-gray-500">철학자 태그</label>
                <div class="flex flex-wrap gap-2 items-center bg-white p-2 border border-gray-100 rounded-lg min-h-[42px]" id="battle-b-philosopher-tags-container">
                    <button type="button" onclick="window.openTagSelectModal('BATTLE_B_PHILOSOPHER')" class="px-2 py-1 border border-dashed border-gray-300 text-gray-500 rounded text-[10px] font-bold">+ 철학자 태그</button>
                </div>
                <label class="block text-[11px] font-bold text-gray-500">가치관 태그</label>
                <div class="flex flex-wrap gap-2 items-center bg-white p-2 border border-gray-100 rounded-lg min-h-[42px]" id="battle-b-value-tags-container">
                    <button type="button" onclick="window.openTagSelectModal('BATTLE_B_VALUE')" class="px-2 py-1 border border-dashed border-gray-300 text-gray-500 rounded text-[10px] font-bold">+ 가치관 태그</button>
                </div>
            </div>
        </div>
    </section>

    <section id="section-script" class="bg-white rounded-2xl p-8 border border-gray-200 shadow-sm">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold flex items-center"><span class="bg-black text-white rounded-full w-6 h-6 flex items-center justify-center text-sm mr-2">3</span> 시나리오 대본</h2>
            <span class="text-xs text-gray-400 font-mono">SCRIPT</span>
        </div>

        <div class="mb-6 bg-[#F8F8F8] border border-gray-200 rounded-xl p-5 space-y-3">
            <p class="text-[12px] font-black text-gray-600">TTS 목소리 설정</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-[12px] font-bold text-gray-700 mb-1.5">NARRATOR</label>
                    <input id="tts-voice-narrator" type="text" placeholder="Fish Audio 모델 ID 입력" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-black transition-all" />
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-gray-700 mb-1.5">A</label>
                    <input id="tts-voice-a" type="text" placeholder="Fish Audio 모델 ID 입력" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-black transition-all" />
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-gray-700 mb-1.5">B</label>
                    <input id="tts-voice-b" type="text" placeholder="Fish Audio 모델 ID 입력" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-black transition-all" />
                </div>
                <div>
                    <label class="block text-[12px] font-bold text-gray-700 mb-1.5">USER</label>
                    <input id="tts-voice-user" type="text" placeholder="Fish Audio 모델 ID 입력" class="w-full bg-white border border-gray-200 rounded-lg px-3 py-2.5 text-sm outline-none focus:border-black transition-all" />
                </div>
            </div>
        </div>

        <div id="start-node-container" class="space-y-3 mb-6">
            <div class="bg-gray-50 border border-gray-200 rounded-2xl p-4 script-block flex gap-4 items-start" data-speaker="NARRATOR">
                <input type="hidden" class="mod-flag" name="modifiedBlocks[]" value="false">
                <div class="flex flex-col gap-2 flex-none w-24">
                    <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest text-center mt-1">START</p>
                    <select class="speaker-select hidden">
                        <option value="NARRATOR" selected>NARRATOR</option>
                    </select>
                </div>
                <textarea rows="1" class="flex-1 bg-transparent text-sm script-text outline-none resize-none py-1 leading-relaxed overflow-hidden" placeholder="시작 내레이션 입력"></textarea>
            </div>
        </div>

        <div class="flex space-x-3 mb-10">
            <button type="button" onclick="addScriptBlock('start-node-container', 'A')" class="flex-1 py-4 border-2 border-dashed border-gray-200 rounded-2xl text-gray-400 text-sm font-bold hover:bg-gray-50 hover:border-gray-400 transition-all">+ 스크립트 추가</button>
            <button type="button" id="btn-add-branch" onclick="addBranchBlock()" class="flex-1 py-4 border-2 border-dashed border-purple-200 text-purple-400 rounded-2xl text-sm font-bold hover:bg-purple-50 hover:border-purple-400 transition-all">+ 분기 추가</button>
        </div>

        <div id="branch-container" class="hidden bg-purple-50/50 border border-purple-200 rounded-2xl p-6 mb-10 relative">
            <button type="button" onclick="removeBranchBlock()" class="absolute top-4 right-4 w-8 h-8 bg-white border border-purple-200 text-purple-500 rounded-full flex items-center justify-center font-bold shadow-sm hover:bg-red-50 hover:text-red-500 transition-all">&times;</button>
            <h3 class="text-purple-700 font-bold text-sm mb-6">인터랙티브 분기</h3>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white border border-purple-100 rounded-2xl p-5 shadow-sm">
                    <p class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2.5 py-1 inline-block rounded-md mb-3">OPTION A PATH</p>
                    <textarea id="branch-a-label" rows="2" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm mb-4 outline-none focus:border-blue-400 form-scrollbar"></textarea>
                    <div id="branch-a-node-container" class="space-y-3 mb-4"></div>
                    <button type="button" onclick="addScriptBlock('branch-a-node-container', 'A')" class="w-full py-3 border border-dashed border-blue-200 text-blue-400 rounded-xl text-xs font-bold hover:bg-blue-50 transition-all">+ A 스크립트 추가</button>
                </div>
                <div class="bg-white border border-purple-100 rounded-2xl p-5 shadow-sm">
                    <p class="text-[10px] font-bold text-red-600 bg-red-50 px-2.5 py-1 inline-block rounded-md mb-3">OPTION B PATH</p>
                    <textarea id="branch-b-label" rows="2" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-3 text-sm mb-4 outline-none focus:border-red-400 form-scrollbar"></textarea>
                    <div id="branch-b-node-container" class="space-y-3 mb-4"></div>
                    <button type="button" onclick="addScriptBlock('branch-b-node-container', 'B')" class="w-full py-3 border border-dashed border-red-200 text-red-400 rounded-xl text-xs font-bold hover:bg-red-50 transition-all">+ B 스크립트 추가</button>
                </div>
            </div>
        </div>

        <div id="closing-node-container" class="space-y-3">
            <div class="bg-white border border-[#E5E0D8] rounded-xl p-4 script-block flex gap-4 items-start" data-speaker="NARRATOR">
                <input type="hidden" class="mod-flag" name="modifiedBlocks[]" value="false">
                <div class="flex flex-col gap-2 flex-none w-24">
                    <p class="text-[11px] font-black text-[#8B7355] uppercase tracking-widest text-center mt-1">CLOSING</p>
                    <select class="speaker-select hidden">
                        <option value="NARRATOR" selected>NARRATOR</option>
                    </select>
                </div>
                <textarea rows="1" class="flex-1 bg-transparent text-sm script-text outline-none resize-none py-1 leading-relaxed overflow-hidden" placeholder="클로징 내레이션 입력"></textarea>
            </div>
        </div>
    </section>
</div>
