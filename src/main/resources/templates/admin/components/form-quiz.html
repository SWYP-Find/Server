<div th:fragment="quizForm" class="space-y-6" xmlns:th="http://www.thymeleaf.org">
    <section class="bg-white rounded-2xl p-8 border border-gray-200 shadow-sm">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold flex items-center"><span class="bg-black text-white rounded-full w-6 h-6 flex items-center justify-center text-sm mr-2">1</span> 퀴즈 등록</h2>
            <span class="text-xs text-gray-400 font-mono">QUIZ</span>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-[13px] font-bold text-gray-700 mb-2">제목 <span class="text-red-500 ml-0.5">*</span></label>
                <input type="text" id="quiz-title" name="title" placeholder="퀴즈 제목을 입력하세요" class="w-full bg-[#FBFBFA] border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none transition placeholder:text-gray-400" />
            </div>

            <div>
                <label class="block text-[13px] font-bold text-gray-700 mb-2">타겟 날짜 <span class="text-red-500 ml-0.5">*</span></label>
                <input type="date" id="quiz-target-date" class="w-full bg-[#FBFBFA] border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none transition" />
            </div>

            <hr class="border-gray-100 my-8">

            <div>
                <label class="block text-[14px] font-bold text-gray-800 mb-4">퀴즈 선택지</label>
                <div class="flex gap-4">
                    <div class="flex-1 bg-[#F5F4F2] p-6 rounded-xl border border-[#EAE9E6] space-y-4">
                        <input type="hidden" name="options[0].label" value="A" />
                        <div class="flex items-center mb-1">
                            <input type="radio" id="quiz-answer-a" name="quiz-answer" value="A" class="w-4 h-4 text-black bg-gray-100 border-gray-300 focus:ring-black cursor-pointer" checked>
                            <label for="quiz-answer-a" class="ml-2 text-[13px] font-bold text-gray-800 cursor-pointer">A를 정답으로 설정</label>
                        </div>
                        <div>
                            <label class="block text-[12px] font-bold text-gray-600 mb-1.5">A</label>
                            <input type="text" id="quiz-option-a-title" name="options[0].text" placeholder="A 선택지 내용 입력" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none placeholder:text-gray-400">
                        </div>
                        <div>
                            <label class="block text-[12px] font-bold text-gray-600 mb-1.5">설명</label>
                            <input type="text" id="quiz-option-a-detail" name="options[0].detailText" placeholder="A 선택지 설명 입력" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none placeholder:text-gray-400">
                        </div>
                    </div>

                    <div class="flex-1 bg-[#F5F4F2] p-6 rounded-xl border border-[#EAE9E6] space-y-4">
                        <input type="hidden" name="options[1].label" value="B" />
                        <div class="flex items-center mb-1">
                            <input type="radio" id="quiz-answer-b" name="quiz-answer" value="B" class="w-4 h-4 text-black bg-gray-100 border-gray-300 focus:ring-black cursor-pointer">
                            <label for="quiz-answer-b" class="ml-2 text-[13px] font-bold text-gray-800 cursor-pointer">B를 정답으로 설정</label>
                        </div>
                        <div>
                            <label class="block text-[12px] font-bold text-gray-600 mb-1.5">B</label>
                            <input type="text" id="quiz-option-b-title" name="options[1].text" placeholder="B 선택지 내용 입력" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none placeholder:text-gray-400">
                        </div>
                        <div>
                            <label class="block text-[12px] font-bold text-gray-600 mb-1.5">설명</label>
                            <input type="text" id="quiz-option-b-detail" name="options[1].detailText" placeholder="B 선택지 설명 입력" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none placeholder:text-gray-400">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
