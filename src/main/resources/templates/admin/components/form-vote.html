<div th:fragment="voteForm" class="space-y-6" xmlns:th="http://www.thymeleaf.org">
    <section class="bg-white rounded-2xl p-8 border border-gray-200 shadow-sm">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold flex items-center"><span class="bg-black text-white rounded-full w-6 h-6 flex items-center justify-center text-sm mr-2">1</span> 투표 등록</h2>
            <span class="text-xs text-gray-400 font-mono">POLL</span>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block text-[13px] font-bold text-gray-700 mb-2">제목 앞문구 <span class="text-red-500 ml-0.5">*</span></label>
                <input type="text" id="poll-title-prefix" name="titlePrefix" placeholder="나에게 예술이란" class="w-full bg-[#FBFBFA] border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none transition placeholder:text-gray-400">
            </div>

            <div>
                <label class="block text-[13px] font-bold text-gray-700 mb-2">제목 뒷문구</label>
                <input type="text" id="poll-title-suffix" name="titleSuffix" placeholder=" 하는 행위이다." class="w-full bg-[#FBFBFA] border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none transition placeholder:text-gray-400">
            </div>

            <hr class="border-gray-100 my-8">

            <div>
                <label class="block text-[14px] font-bold text-gray-800 mb-4">4 선택지</label>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-[#F5F4F2] p-4 rounded-xl border border-[#EAE9E6] space-y-3">
                        <input type="hidden" name="options[0].label" value="A" />
                        <label class="block text-[12px] font-bold text-gray-600">A</label>
                        <input type="text" id="poll-option-1-title" name="options[0].title" placeholder="A 내용 입력" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none placeholder:text-gray-400">
                    </div>

                    <div class="bg-[#F5F4F2] p-4 rounded-xl border border-[#EAE9E6] space-y-3">
                        <input type="hidden" name="options[1].label" value="B" />
                        <label class="block text-[12px] font-bold text-gray-600">B</label>
                        <input type="text" id="poll-option-2-title" name="options[1].title" placeholder="B 내용 입력" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none placeholder:text-gray-400">
                    </div>

                    <div class="bg-[#F5F4F2] p-4 rounded-xl border border-[#EAE9E6] space-y-3">
                        <input type="hidden" name="options[2].label" value="C" />
                        <label class="block text-[12px] font-bold text-gray-600">C</label>
                        <input type="text" id="poll-option-3-title" name="options[2].title" placeholder="C 내용 입력" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none placeholder:text-gray-400">
                    </div>

                    <div class="bg-[#F5F4F2] p-4 rounded-xl border border-[#EAE9E6] space-y-3">
                        <input type="hidden" name="options[3].label" value="D" />
                        <label class="block text-[12px] font-bold text-gray-600">D</label>
                        <input type="text" id="poll-option-4-title" name="options[3].title" placeholder="D 내용 입력" class="w-full bg-white border border-gray-200 rounded-lg p-3 text-sm focus:border-black outline-none placeholder:text-gray-400">
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
