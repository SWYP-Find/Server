<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Picke Admin - 콘텐츠 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .filter-btn {
            padding: .5rem 1rem;
            border-radius: 9999px;
            font-size: .875rem;
            font-weight: 700;
            transition: all .15s;
            border: 1px solid transparent;
            background: transparent;
            color: #6B7280;
            cursor: pointer;
        }
        .filter-btn:hover { background: #F3F4F6; }
        .filter-btn.active {
            background: white;
            border-color: #E5E7EB;
            color: #111827;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .05);
        }
    </style>
</head>
<body class="bg-[#F9F8F6] text-gray-800 min-h-screen flex flex-col">

<div th:replace="~{admin/fragments/header :: header}"></div>

<main class="flex-1 w-full max-w-[1200px] mx-auto p-8 pt-12">
    <div class="flex justify-between items-end mb-8">
        <div>
            <h1 class="text-2xl font-black text-gray-900 mb-2">콘텐츠 관리</h1>
            <p class="text-sm text-gray-500">배틀, 퀴즈, 투표 콘텐츠를 확인하고 수정할 수 있습니다.</p>
        </div>
        <button onclick="location.href='/api/v1/admin/picke'"
                class="px-6 py-2.5 bg-black text-white rounded-lg text-sm font-bold shadow-md hover:bg-gray-800 transition">
            + 새 콘텐츠 만들기
        </button>
    </div>

    <div class="flex gap-2 mb-2">
        <button data-type-filter="ALL" class="filter-btn type-filter-btn active">전체 유형</button>
        <button data-type-filter="BATTLE" class="filter-btn type-filter-btn">배틀</button>
        <button data-type-filter="QUIZ" class="filter-btn type-filter-btn">퀴즈</button>
        <button data-type-filter="POLL" class="filter-btn type-filter-btn">투표</button>
    </div>

    <div class="flex gap-2 mb-6">
        <button data-status-filter="ALL" class="filter-btn status-filter-btn active">전체 상태</button>
        <button data-status-filter="PUBLISHED" class="filter-btn status-filter-btn">발행</button>
        <button data-status-filter="PENDING" class="filter-btn status-filter-btn">임시 저장</button>
        <button data-status-filter="REJECTED" class="filter-btn status-filter-btn">반려</button>
        <button data-status-filter="ARCHIVED" class="filter-btn status-filter-btn">보관</button>
    </div>

    <div class="bg-white border border-gray-200 rounded-2xl shadow-sm overflow-hidden">
        <table class="w-full text-left text-sm">
            <thead class="bg-gray-50 border-b border-gray-200 text-gray-500">
            <tr>
                <th class="px-6 py-4 font-bold w-16">ID</th>
                <th class="px-6 py-4 font-bold w-24">유형</th>
                <th class="px-6 py-4 font-bold">제목</th>
                <th class="px-6 py-4 font-bold w-32">상태</th>
                <th class="px-6 py-4 font-bold w-32">생성일</th>
                <th class="px-6 py-4 font-bold w-24 text-center">관리</th>
            </tr>
            </thead>
            <tbody id="content-list-tbody" class="divide-y divide-gray-100">
            <tr>
                <td colspan="6" class="px-6 py-12 text-center text-gray-400">
                    <div class="flex flex-col items-center gap-2">
                        <div class="w-5 h-5 border-2 border-gray-300 border-t-gray-600 rounded-full animate-spin"></div>
                        <span>데이터를 불러오는 중입니다...</span>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div id="pagination-container" class="flex justify-center mt-8 gap-1"></div>
</main>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const BASE_URL = '';

        const API = {
            BATTLE_LIST: (page, size, status) => {
                const statusParam = status && status !== 'ALL' ? `&status=${status}` : '';
                return `${BASE_URL}/api/v1/admin/battles?page=${page}&size=${size}${statusParam}`;
            },
            QUIZ_LIST: (page, size, status) => {
                const statusParam = status && status !== 'ALL' ? `&status=${status}` : '';
                return `${BASE_URL}/api/v1/admin/quizzes?page=${page}&size=${size}${statusParam}`;
            },
            POLL_LIST: (page, size, status) => {
                const statusParam = status && status !== 'ALL' ? `&status=${status}` : '';
                return `${BASE_URL}/api/v1/admin/polls?page=${page}&size=${size}${statusParam}`;
            },
            BATTLE_DELETE: (id) => `${BASE_URL}/api/v1/admin/battles/${id}`,
            QUIZ_DELETE: (id) => `${BASE_URL}/api/v1/admin/quizzes/${id}`,
            POLL_DELETE: (id) => `${BASE_URL}/api/v1/admin/polls/${id}`
        };

        const tbody = document.getElementById('content-list-tbody');
        const pagingEl = document.getElementById('pagination-container');
        const token = localStorage.getItem('adminToken');

        if (!token) {
            alert('로그인이 필요합니다.');
            window.location.replace('/api/v1/admin/login');
            return;
        }

        const getAuthHeaders = () => ({
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        });

        let currentPage = 1;
        const PAGE_SIZE = 10;
        const CLIENT_FETCH_SIZE = 500;
        let currentTypeFilter = 'ALL';
        let currentStatusFilter = 'ALL';

        document.querySelectorAll('.type-filter-btn').forEach((btn) => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.type-filter-btn').forEach((b) => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentTypeFilter = e.currentTarget.getAttribute('data-type-filter');
                currentPage = 1;
                fetchContents();
            });
        });

        document.querySelectorAll('.status-filter-btn').forEach((btn) => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.status-filter-btn').forEach((b) => b.classList.remove('active'));
                e.currentTarget.classList.add('active');
                currentStatusFilter = e.currentTarget.getAttribute('data-status-filter');
                currentPage = 1;
                fetchContents();
            });
        });

        const resolveTypeFilter = () => (currentTypeFilter === 'VOTE' ? 'POLL' : currentTypeFilter);

        const normalizeType = (item, sourceType) => {
            if (sourceType === 'BATTLE' || sourceType === 'QUIZ' || sourceType === 'POLL') return sourceType;
            const rawType = (item.type || '').toUpperCase();
            if (rawType === 'QUIZ') return 'QUIZ';
            if (rawType === 'POLL' || rawType === 'VOTE') return 'POLL';
            if (item.quizId != null) return 'QUIZ';
            if (item.pollId != null) return 'POLL';
            return 'BATTLE';
        };

        const normalizeItem = (item, sourceType) => ({
            ...item,
            normalizedType: normalizeType(item, sourceType),
            normalizedId: item.battleId ?? item.quizId ?? item.pollId ?? item.id
        });

        const applyClientFiltersAndSort = (items) => {
            let filtered = items;

            if (currentStatusFilter !== 'ALL') {
                filtered = filtered.filter((item) => (item.status || 'PENDING') === currentStatusFilter);
            }

            filtered = filtered.sort((a, b) => {
                const aTime = a.createdAt ? new Date(a.createdAt).getTime() : 0;
                const bTime = b.createdAt ? new Date(b.createdAt).getTime() : 0;
                if (bTime !== aTime) return bTime - aTime;
                return (b.normalizedId || 0) - (a.normalizedId || 0);
            });

            return filtered;
        };

        const paginate = (items) => {
            const totalPages = Math.max(1, Math.ceil(items.length / PAGE_SIZE));
            const safePage = Math.min(currentPage, totalPages);
            if (safePage !== currentPage) currentPage = safePage;
            const start = (safePage - 1) * PAGE_SIZE;
            return {
                items: items.slice(start, start + PAGE_SIZE),
                totalPages
            };
        };

        const fetchList = async (type, page, size, status) => {
            const endpointByType = {
                BATTLE: API.BATTLE_LIST,
                QUIZ: API.QUIZ_LIST,
                POLL: API.POLL_LIST
            };

            const endpoint = endpointByType[type];
            const res = await fetch(endpoint(page, size, status), {
                headers: getAuthHeaders()
            });

            if (res.status === 401 || res.status === 403) {
                throw { unauthorized: true };
            }
            if (!res.ok) {
                throw new Error(`서버 오류: ${res.status}`);
            }

            const json = await res.json();
            const result = json.result || json.data || {};
            const items = Array.isArray(result.items) ? result.items : [];
            return {
                items: items.map((item) => normalizeItem(item, type)),
                totalPages: result.totalPages || 1
            };
        };

        async function fetchContents() {
            tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">데이터를 불러오는 중입니다...</td></tr>';

            try {
                const typeFilter = resolveTypeFilter();

                if (typeFilter === 'BATTLE') {
                    const response = await fetchList('BATTLE', currentPage, PAGE_SIZE, currentStatusFilter);
                    renderTable(response.items);
                    renderPagination(response.totalPages);
                    return;
                }

                if (typeFilter === 'QUIZ' || typeFilter === 'POLL') {
                    const response = await fetchList(typeFilter, 1, CLIENT_FETCH_SIZE, currentStatusFilter);
                    const filtered = applyClientFiltersAndSort(response.items);
                    const paged = paginate(filtered);
                    renderTable(paged.items);
                    renderPagination(paged.totalPages);
                    return;
                }

                const [battleResponse, quizResponse, pollResponse] = await Promise.all([
                    fetchList('BATTLE', 1, CLIENT_FETCH_SIZE, currentStatusFilter),
                    fetchList('QUIZ', 1, CLIENT_FETCH_SIZE, currentStatusFilter),
                    fetchList('POLL', 1, CLIENT_FETCH_SIZE, currentStatusFilter)
                ]);

                const merged = [
                    ...battleResponse.items,
                    ...quizResponse.items,
                    ...pollResponse.items
                ];

                const filtered = applyClientFiltersAndSort(merged);
                const paged = paginate(filtered);
                renderTable(paged.items);
                renderPagination(paged.totalPages);
            } catch (e) {
                if (e && e.unauthorized) {
                    alert('세션이 만료되었습니다.');
                    window.location.replace('/api/v1/admin/login');
                    return;
                }
                console.error('목록 로드 실패:', e);
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-red-500">데이터 로드에 실패했습니다.</td></tr>';
            }
        }

        function renderTable(items) {
            tbody.innerHTML = '';

            if (!items || items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-12 text-center text-gray-400">등록된 콘텐츠가 없습니다.</td></tr>';
                return;
            }

            items.forEach((item) => {
                const id = item.normalizedId ?? item.battleId ?? item.quizId ?? item.pollId ?? item.id;
                const type = item.normalizedType || normalizeType(item);
                const title = type === 'POLL'
                    ? ((item.titlePrefix || '') + (item.titleSuffix ? ` ${item.titleSuffix}` : '')).trim() || item.title || '(제목 없음)'
                    : item.title || '(제목 없음)';
                const status = item.status || 'PENDING';
                const date = item.createdAt
                    ? new Date(item.createdAt).toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' })
                    : '-';

                const typeBadge = {
                    BATTLE: '<span class="px-2 py-1 bg-purple-100 text-purple-700 text-[10px] font-bold rounded">배틀</span>',
                    QUIZ: '<span class="px-2 py-1 bg-blue-100 text-blue-700 text-[10px] font-bold rounded">퀴즈</span>',
                    POLL: '<span class="px-2 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded">투표</span>'
                }[type] ?? `<span class="px-2 py-1 bg-gray-100 text-gray-700 text-[10px] font-bold rounded">${type}</span>`;

                const statusBadge = {
                    PUBLISHED: '<span class="flex items-center text-green-600 text-xs font-bold"><span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-1.5"></span>발행</span>',
                    PENDING: '<span class="flex items-center text-yellow-600 text-xs font-bold"><span class="w-1.5 h-1.5 rounded-full bg-yellow-400 mr-1.5"></span>임시 저장</span>',
                    REJECTED: '<span class="flex items-center text-red-500 text-xs font-bold"><span class="w-1.5 h-1.5 rounded-full bg-red-400 mr-1.5"></span>반려</span>',
                    ARCHIVED: '<span class="flex items-center text-gray-400 text-xs font-bold"><span class="w-1.5 h-1.5 rounded-full bg-gray-400 mr-1.5"></span>보관</span>'
                }[status] ?? `<span class="text-xs font-bold text-gray-500">${status}</span>`;

                const tr = document.createElement('tr');
                tr.className = 'hover:bg-gray-50 transition cursor-pointer';
                tr.setAttribute('data-type', type);

                tr.onclick = (e) => {
                    if (e.target.closest('.delete-btn')) return;
                    window.location.href = `/api/v1/admin/picke?id=${id}&type=${type}`;
                };

                tr.innerHTML = `
                <td class="px-6 py-4 text-gray-500 font-mono">${id}</td>
                <td class="px-6 py-4">${typeBadge}</td>
                <td class="px-6 py-4 font-bold text-gray-900">${title}</td>
                <td class="px-6 py-4">${statusBadge}</td>
                <td class="px-6 py-4 text-gray-500 text-xs">${date}</td>
                <td class="px-6 py-4 text-center">
                    <button class="delete-btn text-gray-400 hover:text-red-500 font-bold text-xs px-2 py-1 border border-gray-200 rounded bg-white hover:border-red-200 transition"
                            onclick="deleteContent(${id}, '${type}')">삭제</button>
                </td>`;
                tbody.appendChild(tr);
            });
        }

        function renderPagination(totalPages) {
            pagingEl.innerHTML = '';
            if (totalPages <= 1) return;

            const createBtn = (label, page, disabled, active) => {
                const btn = document.createElement('button');
                btn.innerHTML = label;
                btn.className = [
                    'w-8 h-8 flex items-center justify-center rounded-lg text-sm transition',
                    active ? 'bg-black text-white font-bold cursor-default' : '',
                    disabled ? 'border border-gray-200 bg-white text-gray-300 cursor-not-allowed' : '',
                    (!active && !disabled) ? 'border border-gray-200 bg-white text-gray-600 hover:bg-gray-50' : ''
                ].join(' ');

                if (!disabled && !active) {
                    btn.onclick = () => {
                        currentPage = page;
                        fetchContents();
                    };
                }
                return btn;
            };

            pagingEl.appendChild(createBtn('&lt;', currentPage - 1, currentPage === 1, false));
            for (let i = 1; i <= totalPages; i++) {
                pagingEl.appendChild(createBtn(i, i, false, i === currentPage));
            }
            pagingEl.appendChild(createBtn('&gt;', currentPage + 1, currentPage === totalPages, false));
        }

        window.deleteContent = async function (id, type) {
            if (!confirm(`정말 ${id}번 콘텐츠를 삭제하시겠습니까?`)) return;

            let deleteApi;
            if (type === 'BATTLE') {
                deleteApi = API.BATTLE_DELETE(id);
            } else if (type === 'QUIZ') {
                deleteApi = API.QUIZ_DELETE(id);
            } else if (type === 'POLL' || type === 'VOTE') {
                deleteApi = API.POLL_DELETE(id);
            } else {
                alert('지원하지 않는 콘텐츠 타입입니다.');
                return;
            }

            try {
                const res = await fetch(deleteApi, {
                    method: 'DELETE',
                    headers: getAuthHeaders()
                });

                if (res.status === 401 || res.status === 403) {
                    alert('세션이 만료되었습니다.');
                    window.location.replace('/api/v1/admin/login');
                    return;
                }

                if (res.ok) {
                    alert('삭제되었습니다.');
                    fetchContents();
                } else {
                    const err = await res.json();
                    alert(`삭제 실패: ${err.message || '서버 오류'}`);
                }
            } catch (e) {
                console.error('삭제 실패:', e);
                alert('삭제 중 서버 연결 오류가 발생했습니다.');
            }
        };

        fetchContents();
    });
</script>
</body>
</html>
