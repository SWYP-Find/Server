<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pické - 철학자 유형 결과</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Noto Sans KR', sans-serif; }</style>
</head>
<body class="bg-[#FDF6F0] flex items-center justify-center min-h-screen">

<div id="app" class="w-full max-w-sm mx-auto flex flex-col items-center justify-center min-h-screen px-6 text-center">

    <!-- 모바일: 리다이렉트 중 표시 -->
    <div id="mobile-view" class="hidden flex-col items-center gap-6">
        <div class="w-10 h-10 border-4 border-[#7A402D]/30 border-t-[#7A402D] rounded-full animate-spin"></div>
        <p class="text-[#7A402D] font-bold text-lg">앱으로 이동 중...</p>
        <p class="text-gray-500 text-sm">잠시만 기다려주세요</p>
        <a id="store-link" href="#" class="mt-4 px-6 py-3 bg-[#7A402D] text-white rounded-full font-bold text-sm">
            앱 설치하기
        </a>
    </div>

    <!-- PC: 랜딩 페이지 -->
    <div id="pc-view" class="hidden flex-col items-center gap-6">
        <div class="text-6xl mb-2">🦉</div>
        <h1 class="text-2xl font-black text-[#7A402D]">Pické</h1>
        <p class="text-gray-600 text-base leading-relaxed">
            나만의 철학자 유형을 발견하고<br>다양한 관점을 나눠보세요.
        </p>
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 w-full">
            <p class="text-sm text-gray-500 mb-3">모바일 앱에서 확인하세요</p>
            <div class="flex gap-3 justify-center">
                <a href="https://play.google.com/store/apps/details?id=com.swyp.picke"
                   target="_blank"
                   class="px-4 py-2 bg-[#7A402D] text-white rounded-lg text-sm font-bold">
                    Google Play
                </a>
                <a href="https://apps.apple.com/app/picke/id000000000"
                   target="_blank"
                   class="px-4 py-2 bg-[#7A402D] text-white rounded-lg text-sm font-bold">
                    App Store
                </a>
            </div>
        </div>
    </div>

</div>

<script th:inline="javascript">
    const userId = [[${userId}]];

    // 딥링크 스킴 (앱 팀과 협의 후 수정)
    const DEEP_LINK_SCHEME = 'picke://result/' + userId;
    const ANDROID_INTENT    = 'intent://result/' + userId + '#Intent;scheme=picke;package=com.swyp.picke;end';
    const PLAY_STORE_URL    = 'https://play.google.com/store/apps/details?id=com.swyp.picke';
    const APP_STORE_URL     = 'https://apps.apple.com/app/picke/id000000000'; // TODO: App Store ID 교체

    const ua = navigator.userAgent.toLowerCase();
    const isAndroid = /android/.test(ua);
    const isIOS = /iphone|ipad|ipod/.test(ua);
    const isMobile = isAndroid || isIOS;

    if (isMobile) {
        document.getElementById('mobile-view').classList.remove('hidden');
        document.getElementById('mobile-view').classList.add('flex');

        const storeLink = isAndroid ? PLAY_STORE_URL : APP_STORE_URL;
        document.getElementById('store-link').href = storeLink;

        // 딥링크 시도 후 일정 시간 내 앱 전환 안 되면 스토어로 이동
        const fallbackTimer = setTimeout(() => {
            window.location.href = storeLink;
        }, 2500);

        window.addEventListener('blur', () => clearTimeout(fallbackTimer));

        if (isAndroid) {
            window.location.href = ANDROID_INTENT;
        } else {
            window.location.href = DEEP_LINK_SCHEME;
        }
    } else {
        document.getElementById('pc-view').classList.remove('hidden');
        document.getElementById('pc-view').classList.add('flex');
    }
</script>

</body>
</html>
